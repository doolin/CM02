name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm test

  deploy:
    name: Deploy Lambda
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Build deployment package
        run: |
          zip -r deployment.zip \
            index.js \
            lib/ \
            data/cm02-control.json \
            public/ \
            node_modules/ \
            -x "*.test.js" "data/NIST_SP-800-53_rev5_catalog.json"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deployment.zip \
            --publish

      - name: Wait for update
        run: |
          aws lambda wait function-updated-v2 \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }}

      - name: Smoke test
        run: |
          aws lambda invoke \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --payload '{"systemName":"CI smoke test","implementationStatus":"Planned","frequency":"annually","circumstances":"CI test","implementationNarrative":"Automated CI test","responsibleRole":"CI"}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/response.json
          cat /tmp/response.json
          grep -q '"pdf_url"' /tmp/response.json
